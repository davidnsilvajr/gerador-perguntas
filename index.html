<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Perguntas</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        h1 {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(120deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 30px;
            background: rgba(255,255,255,0.05);
            padding: 8px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
        }
        .tab {
            flex: 1;
            padding: 14px 20px;
            background: transparent;
            border: none;
            border-radius: 12px;
            color: #94a3b8;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .tab:hover {
            color: #fff;
        }
        .tab.active {
            background: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }
        .panel {
            display: none;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 40px;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .panel.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .presenter-view {
            text-align: center;
        }
        .qr-section {
            margin-bottom: 40px;
        }
        .qr-container {
            background: white;
            padding: 25px;
            border-radius: 20px;
            display: inline-block;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        #qrcode img, #qrcode canvas {
            display: block;
        }
        .url-box {
            margin-top: 20px;
            padding: 16px 24px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 12px;
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
            color: #60a5fa;
            word-break: break-all;
        }
        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .count-badge {
            background: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%);
            color: white;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .questions-list {
            max-height: 400px;
            overflow-y: auto;
            padding-right: 10px;
        }
        .questions-list::-webkit-scrollbar {
            width: 6px;
        }
        .questions-list::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 3px;
        }
        .questions-list::-webkit-scrollbar-thumb {
            background: rgba(59, 130, 246, 0.5);
            border-radius: 3px;
        }
        .question-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-left: 4px solid #3b82f6;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 0 16px 16px 0;
            animation: slideIn 0.3s ease;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .question-card:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 20px rgba(59, 130, 246, 0.15);
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .question-card .meta {
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .question-card .meta .name {
            color: #60a5fa;
            font-weight: 500;
        }
        .question-card .text {
            font-size: 1.05rem;
            color: #e2e8f0;
            line-height: 1.6;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }
        .empty-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* Formulário */
        .submit-form {
            max-width: 500px;
            margin: 0 auto;
        }
        .form-group {
            margin-bottom: 24px;
        }
        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 500;
            color: #cbd5e1;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            font-size: 1rem;
            font-family: inherit;
            color: #fff;
            transition: all 0.3s ease;
        }
        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: #64748b;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }
        .form-group textarea {
            min-height: 140px;
            resize: vertical;
        }
        .btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
        }
        .btn:active {
            transform: translateY(-1px);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            box-shadow: none;
            margin-top: 12px;
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.15);
            box-shadow: none;
        }
        .success-message {
            display: none;
            text-align: center;
            padding: 50px 20px;
        }
        .success-message.show {
            display: block;
            animation: fadeIn 0.4s ease;
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 2.5rem;
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
        }
        .success-message h2 {
            font-size: 1.8rem;
            margin-bottom: 12px;
            color: #10b981;
        }
        .success-message p {
            color: #94a3b8;
            margin-bottom: 30px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px 15px;
            }
            h1 {
                font-size: 1.8rem;
            }
            .panel {
                padding: 25px 20px;
            }
            .qr-container {
                padding: 15px;
            }
            #qrcode img, #qrcode canvas {
                max-width: 180px !important;
                height: auto !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Perguntas ao Apresentador</h1>
        <p class="subtitle">Escaneie o QR Code e envie sua pergunta</p>

        <div class="tabs">
            <button class="tab active" onclick="showPanel('presenter')">
                Apresentador
            </button>
            <button class="tab" onclick="showPanel('submit')">
                Enviar Pergunta
            </button>
        </div>

        <!-- Painel do Apresentador -->
        <div id="presenter-panel" class="panel active">
            <div class="presenter-view">
                <div class="qr-section">
                    <h2 class="section-title">QR Code para Perguntas</h2>
                    <br>
                    <div class="qr-container">
                        <div id="qrcode"></div>
                    </div>
                    <div class="url-box" id="url-display"></div>
                </div>

                <h2 class="section-title">
                    Perguntas Recebidas
                    <span class="count-badge" id="question-count">0</span>
                </h2>
                <br>
                <div class="questions-list" id="questions-list">
                    <div class="empty-state">
                        <div class="empty-icon">💬</div>
                        <p>Nenhuma pergunta ainda</p>
                        <p style="font-size: 0.9rem; margin-top: 8px;">Aguardando perguntas dos participantes...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Painel de Envio -->
        <div id="submit-panel" class="panel">
            <div class="submit-form" id="submit-form">
                <div class="form-group">
                    <label for="name">Seu nome (opcional)</label>
                    <input type="text" id="name" placeholder="Anônimo">
                </div>
                <div class="form-group">
                    <label for="question">Sua pergunta</label>
                    <textarea id="question" placeholder="Digite sua pergunta aqui..." required></textarea>
                </div>
                <button class="btn" onclick="submitQuestion()">Enviar Pergunta</button>
            </div>
            <div class="success-message" id="success-message">
                <div class="success-icon">✓</div>
                <h2>Pergunta Enviada!</h2>
                <p>Sua pergunta foi recibida pelo apresentador.</p>
                <button class="btn btn-secondary" onclick="resetForm()">Enviar outra pergunta</button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'perguntas_recebidas';

        document.addEventListener('DOMContentLoaded', () => {
            generateQRCode();
            loadQuestions();
            setInterval(loadQuestions, 3000);
        });

        function showPanel(panel) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));

            if (panel === 'presenter') {
                document.querySelector('.tab:nth-child(1)').classList.add('active');
                document.getElementById('presenter-panel').classList.add('active');
            } else {
                document.querySelector('.tab:nth-child(2)').classList.add('active');
                document.getElementById('submit-panel').classList.add('active');
            }
        }

        function generateQRCode() {
            const baseUrl = window.location.href.split('?')[0];
            const submitUrl = baseUrl + '?mode=submit';

            document.getElementById('url-display').textContent = submitUrl;

            const qr = qrcode(0, 'M');
            qr.addData(submitUrl);
            qr.make();

            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = qr.createImgTag(6, 0);
        }

        function loadQuestions() {
            const questions = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            const container = document.getElementById('questions-list');
            const countBadge = document.getElementById('question-count');

            countBadge.textContent = questions.length;

            if (questions.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">💬</div>
                        <p>Nenhuma pergunta ainda</p>
                        <p style="font-size: 0.9rem; margin-top: 8px;">Aguardando perguntas dos participantes...</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = questions.map((q) => `
                <div class="question-card">
                    <div class="meta">
                        <span class="name">${escapeHtml(q.name || 'Anônimo')}</span>
                        <span>•</span>
                        <span>${formatTime(q.time)}</span>
                    </div>
                    <div class="text">${escapeHtml(q.text)}</div>
                </div>
            `).join('');
        }

        function submitQuestion() {
            const name = document.getElementById('name').value.trim();
            const text = document.getElementById('question').value.trim();

            if (!text) {
                alert('Por favor, digite sua pergunta.');
                return;
            }

            const questions = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            questions.unshift({
                name: name || 'Anônimo',
                text: text,
                time: Date.now()
            });

            localStorage.setItem(STORAGE_KEY, JSON.stringify(questions));

            document.getElementById('submit-form').style.display = 'none';
            document.getElementById('success-message').classList.add('show');
        }

        function resetForm() {
            document.getElementById('name').value = '';
            document.getElementById('question').value = '';
            document.getElementById('submit-form').style.display = 'block';
            document.getElementById('success-message').classList.remove('show');
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('mode') === 'submit') {
            showPanel('submit');
        }
    </script>
</body>
</html>
